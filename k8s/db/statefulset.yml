apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: app
  labels:
    app: exercise-10
    component: db
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: exercise-10
      component: db
  template:
    metadata:
      labels:
        app: exercise-10
        component: db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: grader
            - name: POSTGRES_PASSWORD
              value: example
            - name: POSTGRES_DB
              value: appdb
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
