apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: app
  labels:
    app: exercise-10
    component: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exercise-10
      component: rabbitmq
  template:
    metadata:
      labels:
        app: exercise-10
        component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.11-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest
            - name: RABBITMQ_DEFAULT_PASS
              value: guest
